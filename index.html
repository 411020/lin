<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>背單字練習</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <div class="brand">背單字卡</div>
      <nav class="nav-links">
        <a href="#flashcard" class="nav-link active" id="flashcardTab">單字卡</a>
        <a href="#manage" class="nav-link" id="manageTab">單字管理</a>
      </nav>
    </div>
  </header>

  <main class="page-container">
    <section id="flashcardSection" class="section active-section">
      <div class="hero">
        <h1>背單字練習</h1>
        <div class="flashcard-wrapper" id="flashcardWrapper">
          <div class="flashcard" id="flashcard">
            <div class="face front" id="cardFront">
              <div class="card-text" id="cardWord">Loading</div>
            </div>
            <div class="face back" id="cardBack">
              <div class="back-content">
                <p><span class="label">翻譯：</span><span id="cardTranslation">-</span></p>
                <p><span class="label">詞性：</span><span id="cardPos">-</span></p>
                <p><span class="label">例句：</span><span id="cardExample">-</span></p>
                <p><span class="label">字根分析：</span><span id="cardRoot">-</span></p>
              </div>
            </div>
          </div>
        </div>
        <div class="button-row">
          <button class="button outline" id="prevBtn">上一張</button>
          <button class="button outline" id="nextBtn">下一張</button>
        </div>
        <p class="hint">點擊卡片可翻轉，後面顯示單字詳情。</p>
      </div>
    </section>

    <section id="manageSection" class="section d-none">
      <div class="grid">
        <div class="card">
          <div class="card-body">
            <h2>新增 / 編輯單字</h2>
            <form id="wordForm">
              <div class="form-group">
                <label for="wordInput">英文單字</label>
                <input type="text" id="wordInput" placeholder="enter" required>
              </div>
              <div class="form-group">
                <label for="translationInput">翻譯</label>
                <input type="text" id="translationInput" placeholder="翻譯" required>
              </div>
              <div class="form-group">
                <label for="posInput">詞性</label>
                <input type="text" id="posInput" placeholder="noun / verb / adj" required>
              </div>
              <div class="form-group">
                <label for="exampleInput">例句</label>
                <textarea id="exampleInput" rows="3" placeholder="例句"></textarea>
              </div>
              <div class="form-group">
                <label for="rootInput">字根分析</label>
                <textarea id="rootInput" rows="2" placeholder="字根/詞源分析"></textarea>
              </div>
              <div class="button-row wrap">
                <button type="submit" class="button primary" id="saveWordBtn">儲存單字</button>
                <button type="button" class="button" id="autoFillBtn">自動填入</button>
                <button type="button" class="button secondary" id="clearFormBtn">清除</button>
              </div>
            </form>
            <div id="autoFillStatus" class="status"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <h2>目前單字清單</h2>
            <div id="wordList" class="word-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
